<div class="auth-wrapper">


  <form (ngSubmit)="onSubmit()" class="auth-form">
  <h2>Registrati</h2>
   

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" [(ngModel)]="form.username" placeholder="Il tuo username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input id="password" name="password" [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="form.password"
          placeholder="La tua password" />
        <button type="button" class="toggle-pwd" (click)="showPassword.set(!showPassword())" tabindex="-1">
          <i [class]="showPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
        </button>
      </div>
    </div>

    <div class="field">
      <label for="confirmedPwd">Conferma password</label>
      <div class="password-wrapper">
        <input id="confirmedPwd" name="confirmedPwd" [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmedPwd" placeholder="Ripeti la password" />
        <button type="button" class="toggle-pwd" (click)="showConfirmPassword.set(!showConfirmPassword())"
          tabindex="-1">
          <i [class]="showConfirmPassword() ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
        </button>
      </div>
    </div>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Caricamento...' : 'Registrati' }}
    </button>
     <div class="link-bar d-flex ">
    
      <a routerLink="/login">Hai già un account? Accedi</a>
    </div>

    @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
    }
  </form>
</div>
