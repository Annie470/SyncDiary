<div class="auth-wrapper">
  <div class="top-bar">
    <a routerLink="/login">Hai già un account? Accedi</a>
  </div>

  <form (ngSubmit)="onSubmit()" class="auth-form">
    <h2>Registrati</h2>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" [(ngModel)]="form.username" placeholder="Il tuo username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" [(ngModel)]="form.password" placeholder="La tua password" />
    </div>

    <div class="field">
      <label for="confirmedPwd">Conferma password</label>
      <input id="confirmedPwd" name="confirmedPwd" type="password" [(ngModel)]="confirmedPwd" placeholder="Ripeti la password" />
    </div>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Caricamento...' : 'Registrati' }}
    </button>

    @if (error()) {
      <div class="alert alert-danger">{{ error() }}</div>
    }
  </form>
</div>
