<div class="page">

  <div class="diary-grid col-12 overflow-y-auto">
    <div class="diary-head">
     <h1 class="mb-0">Diari del giorno</h1>
  <small class="diary-date">{{ currentDate }}</small>
</div>
 @if (loading()) {
    <div class="d-flex justify-content-center mt-5">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Caricamento...</span>
      </div>
    </div>
  }

    @for (diary of diaries(); track diary.id) {
      <div class="diary-card">
        <p class="diary-text">{{ diary.text }}</p>
      </div>
    } @empty {
      <p class="empty">Nessun diario per oggi.</p>
    }
  </div>

  <button class="fab" (click)="openForm()">+</button>

  @if (showForm()) {
    <div class="overlay" (click)="closeForm()">
      <div class="modal" (click)="$event.stopPropagation()">
        <h2>Nuovo diario</h2>

        <form (ngSubmit)="onSubmit()" class="w-100 h-100 d-flex flex-column justify-content-between my-3">
          
          <div class="field">
            <textarea id="text" name="text" [(ngModel)]="form.text" rows="25" placeholder="Scrivi il tuo diario..."></textarea>
          </div>

          @if (error()) {
            <div class="alert alert-danger">{{ error() }}</div>
          }

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeForm()">Annulla</button>
            <button type="submit" [disabled]="loading()">Salva</button>
          </div>

        </form>
      </div>
    </div>
  }

</div>
