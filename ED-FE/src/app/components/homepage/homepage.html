<div class="page">

  <nav class="top-nav">
    <span class="app-title">SyncDiary</span>
    <div class="nav-links">    
      <a class="nav-link nav-new" routerLink="/new-diary">+ Nuovo</a>
    </div>
  </nav>
<h4 class="app-title text-center mt-2">Tutti i diari</h4>
  <div class="main-layout">
   
    <main class="detail-panel">
      @if (selectedDiary()) {
        <div class="detail-card">
          <p class="detail-date">{{ formatDate(selectedDiary()!.daily_date) }}</p>
          <p class="detail-text">{{ selectedDiary()!.text }}</p>
        </div>
      } @else {
        <p class="empty">Non è stato scritto alcun diario oggi.</p>
      }
    </main>

  </div>

</div>
