services:

  syncdiary:
    build: ED-BE
    container_name: edbe_fastapi
    ports:
      - "8002:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./ED-BE/.env
    volumes:
      - ./ED-BE:/app
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  nginx:
    image: nginx:alpine
    container_name: nginx_server_syncD
    ports:
      - "8443:80"
    depends_on:
      - syncdiary
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro                        
    restart: unless-stopped

  syncD-FE:
    image: node:20-alpine
    container_name: edfe_angular
    ports:
      - "4201:4201"
    volumes:
      - ./ED-FE:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4201 --poll 500"
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: mongodb_diary
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
