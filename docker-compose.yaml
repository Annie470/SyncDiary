services:

  syncD-BE:
    build: ED-BE
    container_name: edbe_fastapi
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - ./ED-BE/config.py
    volumes:
      - ED-BE:/app
    working_dir: /app
    command: uvicorn main:app --port 8002 --reload --log-level debug

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    ports:
      - "80:80"
    depends_on:
      - syncD-BE
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro                        
    restart: unless-stopped

  syncD-FE:
    image: node:20-alpine
    container_name: edfe_angular
    ports:
      - "4201:4201"
    volumes:
      - ./ED-FE:/app
    working_dir: /app
    command: sh -c "npm install && npx ng serve --port 4201 --poll 500"
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: mongodb_diary
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
